<!-- modal.html — estructura base de modal reutilizable -->
<div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-md">
    <div class="flex items-center justify-between mb-4">
      <h3 id="modal-titulo" class="text-lg font-semibold text-gray-800">Título</h3>
      <button onclick="cerrarModal()" class="text-gray-400 hover:text-gray-700 text-xl">&times;</button>
    </div>
    <div id="modal-contenido">
      <!-- El formulario se inyecta dinámicamente desde JS -->
    </div>
    <div class="flex justify-end gap-2 mt-4">
      <button onclick="cerrarModal()"
        class="px-4 py-2 text-sm rounded-lg border border-gray-300 hover:bg-gray-50">
        Cancelar
      </button>
      <button id="modal-confirmar"
        class="px-4 py-2 text-sm rounded-lg bg-gray-900 text-white hover:bg-gray-700">
        Guardar
      </button>
    </div>
  </div>
</div>

<script>
function abrirModal() { document.getElementById('modal').classList.remove('hidden'); }
function cerrarModal() { document.getElementById('modal').classList.add('hidden'); }
</script>
